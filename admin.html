<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wings for Growth — Submissions</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  body { font-family: 'Inter', sans-serif; background: #F7F5F2; color: #1A1A2A; }
  .btn { display:inline-flex; align-items:center; gap:0.5rem; padding:0.6rem 1.2rem; border-radius:6px; font-size:0.85rem; font-weight:600; cursor:pointer; border:none; transition:opacity 0.15s; }
  .btn:hover { opacity:0.85; }
  .btn-orange { background:#E8764E; color:#fff; }
  .btn-dark   { background:#1B3040; color:#fff; }
  .btn-red    { background:#DC2626; color:#fff; }
  table { width:100%; border-collapse:collapse; font-size:0.78rem; }
  th { background:#1B3040; color:#fff; padding:0.6rem 0.75rem; text-align:left; font-weight:500; white-space:nowrap; position:sticky; top:0; z-index:1; }
  td { padding:0.55rem 0.75rem; border-bottom:1px solid #E8E4DF; vertical-align:top; max-width:220px; word-break:break-word; }
  tr:nth-child(even) td { background:#F0EDE9; }
  tr:hover td { background:#FFF5F0; }
  #noData { display:none; }
</style>
</head>
<body class="min-h-screen">

<div class="max-w-full px-6 py-8">

  <!-- Header -->
  <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
    <div class="flex items-center gap-4">
      <img src="brand_assets/wings-primary-logo.png" alt="Wings for Growth" class="h-10 w-auto object-contain" />
      <div>
        <h1 class="text-xl font-semibold" style="color:#1B3040;">Application Responses</h1>
        <p class="text-sm text-gray-500 mt-0.5"><span id="countLabel">0</span> submission(s)</p>
      </div>
    </div>
    <div class="flex gap-2 flex-wrap">
      <button class="btn btn-orange" onclick="downloadCSV()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download as Excel (CSV)
      </button>
      <button class="btn btn-dark" onclick="location.href='index.html'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 18l-6-6 6-6"/></svg>
        Back to Form
      </button>
      <button class="btn btn-red" onclick="clearAll()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        Clear All
      </button>
    </div>
  </div>

  <!-- No data state -->
  <div id="noData" class="text-center py-24 text-gray-400">
    <svg class="mx-auto mb-4 opacity-30" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
    <p class="text-lg font-medium">No submissions yet</p>
    <p class="text-sm mt-1">Responses will appear here after someone fills out the form.</p>
    <a href="index.html" class="inline-block mt-6 text-sm font-medium" style="color:#E8764E;">Go to Form →</a>
  </div>

  <!-- Table -->
  <div id="tableWrap" class="overflow-x-auto rounded-xl shadow-sm border border-gray-200 bg-white" style="display:none;">
    <table id="dataTable">
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

</div>

<script>
const STORAGE_KEY = 'wfg_submissions';

function load() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
}

function render() {
  const rows = load();
  document.getElementById('countLabel').textContent = rows.length;

  if (!rows.length) {
    document.getElementById('noData').style.display = 'block';
    document.getElementById('tableWrap').style.display = 'none';
    return;
  }

  document.getElementById('noData').style.display = 'none';
  document.getElementById('tableWrap').style.display = 'block';

  const headers = Object.keys(rows[0]);
  const thead = document.getElementById('thead');
  const tbody = document.getElementById('tbody');

  thead.innerHTML = '<tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr>';
  tbody.innerHTML = rows.map((row, i) =>
    `<tr>` + headers.map(h => `<td title="${esc(row[h] || '')}">${esc(row[h] || '—')}</td>`).join('') + `</tr>`
  ).join('');
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function downloadCSV() {
  const rows = load();
  if (!rows.length) { alert('No submissions to download.'); return; }

  const headers = Object.keys(rows[0]);
  const q = v => '"' + String(v).replace(/"/g,'""') + '"';
  const csv = [
    headers.map(q).join(','),
    ...rows.map(row => headers.map(h => q(row[h] || '')).join(','))
  ].join('\r\n');

  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'wings-applications-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

function clearAll() {
  if (confirm('Delete ALL submissions? This cannot be undone.')) {
    localStorage.removeItem(STORAGE_KEY);
    render();
  }
}

render();
</script>
</body>
</html>
